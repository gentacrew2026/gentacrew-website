<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a call — GentaCrew</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #f8f9fc;
  color: #0d1117;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* NAV */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  height: 64px;
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo {
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -1px;
  color: #0d1117;
  text-decoration: none;
  display: flex;
  align-items: baseline;
}
.nav-logo .crew { color: #5c6af7; }
.nav-logo .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #5c6af7;
  border-radius: 50%;
  margin-left: 2px;
  margin-bottom: 2px;
  box-shadow: 0 0 8px rgba(92,106,247,0.6);
}
.back-link {
  font-size: 14px;
  font-weight: 600;
  color: #6b7280;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.back-link:hover { color: #5c6af7; }

/* CONTENT */
.page-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 64px 48px 96px;
}
.eyebrow {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #5c6af7;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: '';
  display: inline-block;
  width: 24px;
  height: 2px;
  background: #5c6af7;
}
h1 {
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 800;
  letter-spacing: -1.5px;
  word-spacing: 3px;
  line-height: 1.1;
  color: #0d1117;
  margin-bottom: 16px;
}
.subtitle {
  font-size: 17px;
  color: #4b5563;
  max-width: 560px;
  line-height: 1.75;
  margin-bottom: 48px;
}

/* CALENDAR WRAP */
.calendar-wrap {
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid #e5e7eb;
  box-shadow: 0 4px 32px rgba(0,0,0,0.06);
  background: #fff;
}

/* FOOTER */
.page-footer {
  text-align: center;
  padding: 32px;
  font-size: 13px;
  color: #9ca3af;
}
.page-footer a { color: #5c6af7; text-decoration: none; }

@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .page-wrap { padding: 40px 20px 64px; }
  h1 { font-size: 32px; letter-spacing: -1px; }
  .subtitle { font-size: 15px; margin-bottom: 32px; }
  .calendar-wrap { border-radius: 12px; }
  .calendar-wrap iframe { height: 600px; }
}

@media (max-width: 480px) {
  h1 { font-size: 28px; }
  .eyebrow { font-size: 10px; }
  .back-link span { display: none; }
  .calendar-wrap iframe { height: 550px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Genta<span class="crew">Crew</span><span class="dot"></span></a>
  <a href="index.html" class="back-link">← Back to GentaCrew</a>
</nav>

<div class="page-wrap">
  <div class="eyebrow">Book a call</div>
  <h1>Let's talk.<br>Pick a time that works.</h1>
  <p class="subtitle">In 30 minutes we'll know if we can help you. If we can, you'll have your first candidate shortlist within a week.</p>

  <div class="calendar-wrap">
    <iframe
      src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ1XpEgO4mbWdC_Efq1fNsLCVQxT4dPqH2w10UUc9kjb2KLO-iNoDMCR3vR1bF-Z0yxRW0zlT6uo?gv=true"
      style="border:0;display:block;"
      width="100%"
      height="750"
      frameborder="0">
    </iframe>
  </div>
</div>

<div class="page-footer">
  Powered by <strong>vintti</strong> · <a href="index.html">Back to GentaCrew</a>
</div>

</body>
</html>
